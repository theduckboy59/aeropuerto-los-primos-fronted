<div class="container mt-5">

<div class="row">

<!-- FORMULARIO -->
<div class="col-md-4">

<h4 class="mb-3">Registrar Usuario</h4>

<div class="card p-3 shadow-sm">

<input class="form-control mb-2"
placeholder="Nombre"
[(ngModel)]="user.firstName">

<input class="form-control mb-2"
placeholder="Apellido"
[(ngModel)]="user.lastName">

<input type="number"
class="form-control mb-2"
placeholder="Edad"
[(ngModel)]="user.age">

<input class="form-control mb-3"
placeholder="Email"
[(ngModel)]="user.email">

<button
class="btn btn-success w-100"
(click)="saveUser()">
Guardar
</button>

</div>

</div>

<!-- TABLA -->
<div class="col-md-8">

<h4 class="mb-3">Usuarios registrados</h4>

<table class="table table-striped">

<thead class="table-dark">
<tr>
<th>Nombre</th>
<th>Apellido</th>
<th>Email</th>
<th>Edad</th>
<th></th>
</tr>
</thead>

<tbody>

<tr *ngFor="let u of users">

<td>{{u.firstName}}</td>
<td>{{u.lastName}}</td>
<td>{{u.email}}</td>
<td>{{u.age}}</td>

<td>

<button
class="btn btn-danger btn-sm"
(click)="deleteUser(u.id!)">
Eliminar
</button>

</td>

</tr>

</tbody>

</table>

</div>

</div>

</div>
